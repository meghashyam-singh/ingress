---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cart-config
  namespace: roboshop
data:
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  CATALOGUE_HOST: "catalogue-service"
  CATALOGUE_PORT: "8080"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: cart
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      tier: backend
      component: cart
  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: cart
    spec:
      serviceAccountName: cart-service-account
      containers:
        - name: cart-cont
          image: meghashyam792/roboshop:cart
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: cart-port
          envFrom:
            - configMapRef:
                name: cart-config
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: cart-port
            failureThreshold: 2
            initialDelaySeconds: 40
            periodSeconds: 40
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: cart-port
            failureThreshold: 2
            initialDelaySeconds: 40
            periodSeconds: 40
            timeoutSeconds: 10
    
---
apiVersion: v1
kind: Service
metadata:
  name: cart-service
  namespace: roboshop
spec:
  type: ClusterIP
  selector:
    project: roboshop
    tier: backend
    component: cart
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      name: cart-port

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cart-hpa
  namespace: roboshop
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cart
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource: 
        name: cpu
        target:
          type: Utilization
          averageUtilization: 5

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cart-service-account
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: cart
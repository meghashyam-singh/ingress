---
apiVersion: v1
kind: ConfigMap
metadata:
  name: catalogue-config
  namespace: roboshop
data:
  MONGO: "true"
  MONGO_URL: "mongodb://mongodb-service:27017/catalogue"


---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: catalogue
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      tier: backend
      component: catalogue
  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: catalogue
    spec:
      serviceAccountName: catalogue-service-account
      containers:
        - name: catalogue-cont
          image: meghashyam792/roboshop:catalogue
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: catalogue-port
          envFrom:
            - configMapRef:
                name: catalogue-config
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: catalogue-port
            failureThreshold: 2
            initialDelaySeconds: 40
            periodSeconds: 40
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: catalogue-port
            failureThreshold: 2
            initialDelaySeconds: 40
            periodSeconds: 40
            timeoutSeconds: 10
  
---
apiVersion: v1
kind: Service
metadata:
  name: catalogue-service
  namespace: roboshop
spec:
  type: ClusterIP
  selector:
    project: roboshop
    tier: backend
    component: catalogue
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      name: catalogue-port

    
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: catalogue-hpa
  namespace: roboshop
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: catalogue
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 5


---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: catalogue-service-account
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: catalogue

  